<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="640" viewBox="0 0 1440 640" role="img" aria-labelledby="title desc">
  <title id="title">Граница публичного репозитория</title>
  <desc id="desc">Какие файлы публикуются, а какие остаются только на рабочем компьютере.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#edf8f6"/><stop offset="1" stop-color="#f3f6fb"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17323c" flood-opacity=".12"/></filter>
  </defs>
  <rect width="1440" height="640" rx="28" fill="url(#bg)"/>
  <text x="64" y="72" fill="#173238" font-family="Manrope, Segoe UI, sans-serif" font-size="28" font-weight="800">Что попадает в GitHub</text>
  <text x="64" y="102" fill="#657a80" font-family="Manrope, Segoe UI, sans-serif" font-size="14">Публичный исходный код отделён от локальных инструментов, отчётов и данных аудита</text>

  <rect x="64" y="142" width="602" height="424" rx="24" fill="#fff" stroke="#bde0d8" filter="url(#shadow)"/>
  <rect x="86" y="164" width="558" height="64" rx="16" fill="#e9fbf5"/>
  <circle cx="120" cy="196" r="14" fill="#22c55e"/><path d="M113 196l5 5 10-12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <text x="148" y="192" fill="#14532d" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">Публикуется</text>
  <text x="148" y="212" fill="#47705a" font-family="Manrope, Segoe UI, sans-serif" font-size="11">Проверяемые и воспроизводимые материалы проекта</text>
  <g font-family="Manrope, Segoe UI, sans-serif">
    <rect x="92" y="252" width="258" height="72" rx="14" fill="#f7faf9" stroke="#dbe8e5"/><text x="114" y="281" fill="#244047" font-size="14" font-weight="750">src/ и tests/</text><text x="114" y="303" fill="#6c7e83" font-size="11">Код и автоматические проверки</text>
    <rect x="378" y="252" width="258" height="72" rx="14" fill="#f7faf9" stroke="#dbe8e5"/><text x="400" y="281" fill="#244047" font-size="14" font-weight="750">README и docs/</text><text x="400" y="303" fill="#6c7e83" font-size="11">Схемы, руководство и PDF</text>
    <rect x="92" y="342" width="258" height="72" rx="14" fill="#f7faf9" stroke="#dbe8e5"/><text x="114" y="371" fill="#244047" font-size="14" font-weight="750">Сценарии сборки</text><text x="114" y="393" fill="#6c7e83" font-size="11">Spec-файл и команды упаковки</text>
    <rect x="378" y="342" width="258" height="72" rx="14" fill="#f7faf9" stroke="#dbe8e5"/><text x="400" y="371" fill="#244047" font-size="14" font-weight="750">Правила и лицензия</text><text x="400" y="393" fill="#6c7e83" font-size="11">Безопасное применение проекта</text>
  </g>
  <rect x="92" y="442" width="544" height="92" rx="16" fill="#153f3d"/>
  <text x="116" y="476" fill="#fff" font-family="Manrope, Segoe UI, sans-serif" font-size="14" font-weight="750">Перед публикацией</text>
  <text x="116" y="501" fill="#c9e8e4" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Тесты → проверка diff → поиск секретов → явный список файлов</text>

  <rect x="774" y="142" width="602" height="424" rx="24" fill="#fff" stroke="#efcaca" filter="url(#shadow)"/>
  <rect x="796" y="164" width="558" height="64" rx="16" fill="#fff0f0"/>
  <circle cx="830" cy="196" r="14" fill="#ef4444"/><path d="M824 190l12 12M836 190l-12 12" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <text x="858" y="192" fill="#8b1f1f" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">Остаётся локально</text>
  <text x="858" y="212" fill="#985b5b" font-family="Manrope, Segoe UI, sans-serif" font-size="11">Данные среды, реальные результаты и сторонние бинарники</text>
  <g font-family="Manrope, Segoe UI, sans-serif">
    <rect x="802" y="252" width="258" height="72" rx="14" fill="#fff8f8" stroke="#f0dddd"/><text x="824" y="281" fill="#5d3030" font-size="14" font-weight="750">outputs/ и *.html</text><text x="824" y="303" fill="#8a6767" font-size="11">Реальные отчёты и инвентаризация</text>
    <rect x="1088" y="252" width="258" height="72" rx="14" fill="#fff8f8" stroke="#f0dddd"/><text x="1110" y="281" fill="#5d3030" font-size="14" font-weight="750">tools/</text><text x="1110" y="303" fill="#8a6767" font-size="11">Nmap, TShark и сторонние DLL</text>
    <rect x="802" y="342" width="258" height="72" rx="14" fill="#fff8f8" stroke="#f0dddd"/><text x="824" y="371" fill="#5d3030" font-size="14" font-weight="750">Логи и временные файлы</text><text x="824" y="393" fill="#8a6767" font-size="11">tmp/, startup.log, дампы</text>
    <rect x="1088" y="342" width="258" height="72" rx="14" fill="#fff8f8" stroke="#f0dddd"/><text x="1110" y="371" fill="#5d3030" font-size="14" font-weight="750">Секреты и идентификаторы</text><text x="1110" y="393" fill="#8a6767" font-size="11">Токены, ключи, имена узлов, адреса</text>
  </g>
  <rect x="802" y="442" width="544" height="92" rx="16" fill="#5f2525"/>
  <text x="826" y="476" fill="#fff" font-family="Manrope, Segoe UI, sans-serif" font-size="14" font-weight="750">Не добавлять даже временно</text>
  <text x="826" y="501" fill="#f4cccc" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Игнорирование Git не заменяет проверку staged diff перед push</text>
</svg>
