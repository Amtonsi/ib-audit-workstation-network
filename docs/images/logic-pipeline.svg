<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="600" viewBox="0 0 1440 600" role="img" aria-labelledby="title desc">
  <title id="title">Логика безопасного аудита</title>
  <desc id="desc">От разрешения и выбора локальной цели до нормализации, ИБ-анализа, отчёта и гарантированного завершения процессов.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#edf8f6"/><stop offset="1" stop-color="#f1f5fb"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17333e" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6z" fill="#7b9aa3"/></marker>
  </defs>
  <rect width="1440" height="600" rx="28" fill="url(#bg)"/>
  <text x="64" y="70" fill="#173238" font-family="Manrope, Segoe UI, sans-serif" font-size="28" font-weight="800">Как проходит проверка</text>
  <text x="64" y="100" fill="#657a80" font-family="Manrope, Segoe UI, sans-serif" font-size="14">Разрешённый локальный периметр, ограниченный профиль Nmap и безопасная телеметрия Windows</text>

  <g stroke="#7b9aa3" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M272 228h70"/><path d="M538 228h70"/><path d="M804 228h70"/><path d="M1070 228h70"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="64" y="150" width="208" height="156" rx="22" fill="#fff" stroke="#cfe1df"/>
    <rect x="330" y="150" width="208" height="156" rx="22" fill="#fff" stroke="#cfe1df"/>
    <rect x="596" y="150" width="208" height="156" rx="22" fill="#fff" stroke="#cfe1df"/>
    <rect x="862" y="150" width="208" height="156" rx="22" fill="#fff" stroke="#cfe1df"/>
    <rect x="1128" y="150" width="248" height="156" rx="22" fill="#153f3d" stroke="#153f3d"/>
  </g>
  <circle cx="100" cy="188" r="20" fill="#dff6f1"/><text x="94" y="195" fill="#0f766e" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">1</text>
  <text x="92" y="232" fill="#20383e" font-family="Manrope, Segoe UI, sans-serif" font-size="17" font-weight="800">Разрешение</text>
  <text x="92" y="258" fill="#687b81" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Владелец, цель, время</text>
  <text x="92" y="278" fill="#687b81" font-family="Manrope, Segoe UI, sans-serif" font-size="12">и допустимые методы</text>

  <circle cx="366" cy="188" r="20" fill="#e8f1ff"/><text x="360" y="195" fill="#2563eb" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">2</text>
  <text x="358" y="232" fill="#20383e" font-family="Manrope, Segoe UI, sans-serif" font-size="17" font-weight="800">Локальная цель</text>
  <text x="358" y="258" fill="#687b81" font-family="Manrope, Segoe UI, sans-serif" font-size="12">127.0.0.1 + адрес</text>
  <text x="358" y="278" fill="#687b81" font-family="Manrope, Segoe UI, sans-serif" font-size="12">выбранного адаптера</text>

  <circle cx="632" cy="188" r="20" fill="#fff4db"/><text x="626" y="195" fill="#b45309" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">3</text>
  <text x="624" y="232" fill="#20383e" font-family="Manrope, Segoe UI, sans-serif" font-size="17" font-weight="800">Сбор</text>
  <text x="624" y="258" fill="#687b81" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Nmap: -sT -sV -T3</text>
  <text x="624" y="278" fill="#687b81" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Windows TCP/UDP telemetry</text>

  <circle cx="898" cy="188" r="20" fill="#f1eaff"/><text x="892" y="195" fill="#6d28d9" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">4</text>
  <text x="890" y="232" fill="#20383e" font-family="Manrope, Segoe UI, sans-serif" font-size="17" font-weight="800">ИБ-анализ</text>
  <text x="890" y="258" fill="#687b81" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Протоколы, сервисы,</text>
  <text x="890" y="278" fill="#687b81" font-family="Manrope, Segoe UI, sans-serif" font-size="12">аномалии и уровни риска</text>

  <circle cx="1166" cy="188" r="20" fill="#5eead4"/><text x="1160" y="195" fill="#123c3a" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">5</text>
  <text x="1156" y="232" fill="#fff" font-family="Manrope, Segoe UI, sans-serif" font-size="17" font-weight="800">Результат</text>
  <text x="1156" y="258" fill="#c9e8e4" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Живой монитор + HTML</text>
  <text x="1156" y="278" fill="#c9e8e4" font-family="Manrope, Segoe UI, sans-serif" font-size="12">с раскрываемыми пакетами</text>

  <rect x="64" y="348" width="1312" height="178" rx="22" fill="#fff" stroke="#d5e2e5"/>
  <text x="92" y="388" fill="#20383e" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="800">Контроль безопасности выполнения</text>
  <g font-family="Manrope, Segoe UI, sans-serif">
    <rect x="92" y="414" width="276" height="78" rx="14" fill="#ecfdf5"/><circle cx="120" cy="453" r="8" fill="#22c55e"/><text x="140" y="448" fill="#14532d" font-size="13" font-weight="750">Без скрытой установки драйвера</text><text x="140" y="469" fill="#4d765d" font-size="11">Npcap не запускается автоматически</text>
    <rect x="390" y="414" width="276" height="78" rx="14" fill="#eff6ff"/><circle cx="418" cy="453" r="8" fill="#3b82f6"/><text x="438" y="448" fill="#1e3a8a" font-size="13" font-weight="750">Ограничение цели</text><text x="438" y="469" fill="#536b99" font-size="11">Только локальная машина по умолчанию</text>
    <rect x="688" y="414" width="276" height="78" rx="14" fill="#fff7ed"/><circle cx="716" cy="453" r="8" fill="#f59e0b"/><text x="736" y="448" fill="#7c2d12" font-size="13" font-weight="750">Остановка по отмене</text><text x="736" y="469" fill="#8d654f" font-size="11">Токен отмены передаётся коллекторам</text>
    <rect x="986" y="414" width="362" height="78" rx="14" fill="#f3f4f6"/><circle cx="1014" cy="453" r="8" fill="#64748b"/><text x="1034" y="448" fill="#334155" font-size="13" font-weight="750">Гарантированное завершение процессов</text><text x="1034" y="469" fill="#687783" font-size="11">Nmap, TShark и Dumpcap приложения закрываются вместе с GUI</text>
  </g>
</svg>
