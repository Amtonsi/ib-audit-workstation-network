  <rect x="405" y="577" width="130" height="50" rx="25" fill="#fef3c7" stroke="#fbbf24"/><text x="443" y="607" fill="#92400e" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700">СЕРВИС</text>
  <rect x="440" y="677" width="142" height="50" rx="25" fill="#f1f5f9" stroke="#94a3b8"/><text x="472" y="707" fill="#475569" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700">АДАПТЕР</text>
