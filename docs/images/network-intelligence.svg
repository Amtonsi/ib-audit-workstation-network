<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Сетевой живой монитор IB Audit Workstation</title>
  <desc id="desc">Пакеты с цветовой маркировкой протоколов, результаты Nmap, схема узлов и ИБ-анализ в одном окне.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#edf6f5"/><stop offset="1" stop-color="#f4f7fb"/></linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#123c3a"/><stop offset="1" stop-color="#1d4f63"/></linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="9" stdDeviation="14" flood-color="#18323c" flood-opacity=".13"/></filter>
  </defs>
  <rect width="1440" height="820" rx="28" fill="url(#bg)"/>
  <rect x="28" y="24" width="1384" height="772" rx="22" fill="#fff" filter="url(#s)"/>
  <rect x="28" y="24" width="1384" height="82" rx="22" fill="url(#head)"/>
  <path d="M28 84h1384v22H28z" fill="url(#head)"/>
  <text x="58" y="59" fill="#fff" font-family="Manrope, Segoe UI, sans-serif" font-size="23" font-weight="750">Сетевой монитор: пакеты + Nmap</text>
  <circle cx="61" cy="82" r="6" fill="#4ade80"/>
  <text x="76" y="87" fill="#c8ebe6" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Захват активен · Беспроводная сеть · 126 пакетов</text>
  <rect x="792" y="45" width="126" height="36" rx="18" fill="#ffffff16" stroke="#77cfc4"/><text x="820" y="68" fill="#e6fffb" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700">Локальные цели</text>
  <rect x="930" y="45" width="112" height="36" rx="18" fill="#ffffff16" stroke="#77cfc4"/><text x="959" y="68" fill="#e6fffb" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700">11 портов</text>
  <rect x="1054" y="45" width="86" height="36" rx="18" fill="#ffffff16" stroke="#77cfc4"/><text x="1086" y="68" fill="#e6fffb" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700">T3</text>
  <rect x="1184" y="43" width="194" height="40" rx="10" fill="#5eead4"/><text x="1217" y="68" fill="#123c3a" font-family="Manrope, Segoe UI, sans-serif" font-size="13" font-weight="800">Открыть отчёт</text>

  <rect x="48" y="126" width="862" height="372" rx="16" fill="#fff" stroke="#d9e3e6"/>
  <text x="70" y="158" fill="#263b42" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="750">Пакеты и трафик</text>
  <text x="776" y="158" fill="#698087" font-family="Manrope, Segoe UI, sans-serif" font-size="11">цвет = протокол</text>
  <rect x="64" y="174" width="830" height="34" rx="8" fill="#edf3f5"/>
  <g fill="#52676e" font-family="Manrope, Segoe UI, sans-serif" font-size="11" font-weight="700">
    <text x="78" y="196">№</text><text x="118" y="196">Время</text><text x="212" y="196">Источник</text><text x="355" y="196">Назначение</text><text x="504" y="196">Протокол</text><text x="594" y="196">Длина</text><text x="662" y="196">Описание</text>
  </g>
  <g font-family="Cascadia Mono, Consolas, monospace" font-size="11">
    <rect x="64" y="216" width="830" height="39" rx="7" fill="#e8f3ff"/><text x="78" y="240" fill="#27445a">121</text><text x="118" y="240" fill="#27445a">12.240</text><text x="212" y="240" fill="#27445a">LOCAL-IP</text><text x="355" y="240" fill="#27445a">127.0.0.1</text><text x="504" y="240" fill="#1d4ed8" font-weight="700">TCP</text><text x="594" y="240" fill="#27445a">66</text><text x="662" y="240" fill="#27445a">SYN → 443</text>
    <rect x="64" y="260" width="830" height="39" rx="7" fill="#e9fbf0"/><text x="78" y="284" fill="#28523a">122</text><text x="118" y="284" fill="#28523a">12.247</text><text x="212" y="284" fill="#28523a">127.0.0.1</text><text x="355" y="284" fill="#28523a">LOCAL-IP</text><text x="504" y="284" fill="#15803d" font-weight="700">TLS</text><text x="594" y="284" fill="#28523a">1514</text><text x="662" y="284" fill="#28523a">Application data</text>
    <rect x="64" y="304" width="830" height="39" rx="7" fill="#fff5dc"/><text x="78" y="328" fill="#624b20">123</text><text x="118" y="328" fill="#624b20">12.254</text><text x="212" y="328" fill="#624b20">LOCAL-IP</text><text x="355" y="328" fill="#624b20">DNS-SERVER</text><text x="504" y="328" fill="#b45309" font-weight="700">DNS</text><text x="594" y="328" fill="#624b20">78</text><text x="662" y="328" fill="#624b20">Standard query A</text>
    <rect x="64" y="348" width="830" height="39" rx="7" fill="#f2ecff"/><text x="78" y="372" fill="#4f3c6e">124</text><text x="118" y="372" fill="#4f3c6e">12.271</text><text x="212" y="372" fill="#4f3c6e">LOCAL-IP</text><text x="355" y="372" fill="#4f3c6e">GATEWAY</text><text x="504" y="372" fill="#6d28d9" font-weight="700">ICMP</text><text x="594" y="372" fill="#4f3c6e">98</text><text x="662" y="372" fill="#4f3c6e">Echo request</text>
    <rect x="64" y="392" width="830" height="39" rx="7" fill="#f4f7f8"/><text x="78" y="416" fill="#455b63">125</text><text x="118" y="416" fill="#455b63">12.289</text><text x="212" y="416" fill="#455b63">GATEWAY</text><text x="355" y="416" fill="#455b63">LOCAL-IP</text><text x="504" y="416" fill="#0f766e" font-weight="700">ARP</text><text x="594" y="416" fill="#455b63">60</text><text x="662" y="416" fill="#455b63">Who has LOCAL-IP?</text>
  </g>
  <rect x="64" y="447" width="830" height="34" rx="8" fill="#f5f8f9"/>
  <text x="80" y="469" fill="#60747b" font-family="Manrope, Segoe UI, sans-serif" font-size="11">Выбранный пакет: Ethernet II › IPv4 › TCP › TLS</text>

  <rect x="930" y="126" width="462" height="372" rx="16" fill="#102136"/>
  <text x="952" y="158" fill="#dcecff" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="750">Nmap: узлы, порты, сервисы</text>
  <circle cx="1362" cy="153" r="6" fill="#4ade80"/>
  <g fill="#8fd5ff" font-family="Cascadia Mono, Consolas, monospace" font-size="11.5">
    <text x="952" y="192">$ nmap -sT -sV -T3 -p 22,53,80,443 127.0.0.1</text>
    <text x="952" y="223" fill="#b6c8d9">Nmap scan report for 127.0.0.1</text>
    <text x="952" y="247" fill="#7de1b8">Host is up (0.0010s latency).</text>
    <text x="952" y="282" fill="#f8fafc">PORT      STATE   SERVICE    VERSION</text>
    <text x="952" y="308">135/tcp   open    msrpc      Microsoft Windows RPC</text>
    <text x="952" y="332">445/tcp   open    microsoft-ds</text>
    <text x="952" y="356" fill="#f7c873">3389/tcp  filtered ms-wbt-server</text>
    <text x="952" y="400" fill="#b6c8d9">Service detection performed.</text>
    <text x="952" y="424" fill="#b6c8d9">Nmap done: 1 IP address (1 host up)</text>
    <text x="952" y="464" fill="#7de1b8">Завершено безопасно · дочерний процесс учтён</text>
  </g>

