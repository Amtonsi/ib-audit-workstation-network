  <circle cx="976" cy="653" r="7" fill="#f59e0b"/><text x="994" y="648" fill="#7c4a08" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="700">Открытая служба SMB</text><text x="994" y="666" fill="#8b672f" font-family="Manrope, Segoe UI, sans-serif" font-size="10.5">Проверьте необходимость порта 445/TCP</text>
  <rect x="952" y="690" width="418" height="58" rx="10" fill="#feecec" stroke="#ef9a9a"/>
