<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="560" viewBox="0 0 1440 560" role="img" aria-labelledby="title desc">
  <title id="title">Правовая граница сетевого аудита</title>
  <desc id="desc">Разрешение, фиксированный периметр, минимизация данных и безопасное хранение отчёта.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef8f6"/><stop offset="1" stop-color="#f5f7fb"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6z" fill="#79a09f"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17333e" flood-opacity=".1"/></filter>
  </defs>
  <rect width="1440" height="560" rx="28" fill="url(#bg)"/>
  <text x="64" y="70" fill="#173238" font-family="Manrope, Segoe UI, sans-serif" font-size="28" font-weight="800">Правовая граница аудита</text>
  <text x="64" y="101" fill="#657a80" font-family="Manrope, Segoe UI, sans-serif" font-size="14">Техническая возможность не является разрешением на проверку чужой системы</text>
  <g stroke="#79a09f" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M340 250h70"/><path d="M690 250h70"/><path d="M1040 250h70"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="64" y="158" width="276" height="184" rx="22" fill="#fff" stroke="#cce0dc"/>
    <rect x="414" y="158" width="276" height="184" rx="22" fill="#fff" stroke="#cce0dc"/>
    <rect x="764" y="158" width="276" height="184" rx="22" fill="#fff" stroke="#cce0dc"/>
    <rect x="1114" y="158" width="262" height="184" rx="22" fill="#153f3d"/>
  </g>
  <circle cx="104" cy="202" r="24" fill="#dcfce7"/><text x="96" y="210" fill="#15803d" font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="800">1</text>
  <text x="94" y="252" fill="#213c42" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">Разрешение</text>
  <text x="94" y="281" fill="#687c82" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Письменное основание,</text><text x="94" y="301" fill="#687c82" font-family="Manrope, Segoe UI, sans-serif" font-size="12">владелец и ответственный</text>
  <circle cx="454" cy="202" r="24" fill="#dbeafe"/><text x="446" y="210" fill="#2563eb" font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="800">2</text>
  <text x="444" y="252" fill="#213c42" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">Периметр</text>
  <text x="444" y="281" fill="#687c82" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Точные узлы, порты, срок</text><text x="444" y="301" fill="#687c82" font-family="Manrope, Segoe UI, sans-serif" font-size="12">и допустимая интенсивность</text>
  <circle cx="804" cy="202" r="24" fill="#fef3c7"/><text x="796" y="210" fill="#b45309" font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="800">3</text>
  <text x="794" y="252" fill="#213c42" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">Минимизация</text>
  <text x="794" y="281" fill="#687c82" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Только необходимые данные,</text><text x="794" y="301" fill="#687c82" font-family="Manrope, Segoe UI, sans-serif" font-size="12">ограниченный срок хранения</text>
  <circle cx="1154" cy="202" r="24" fill="#5eead4"/><text x="1146" y="210" fill="#123c3a" font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="800">4</text>
  <text x="1144" y="252" fill="#fff" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">Отчёт</text>
  <text x="1144" y="281" fill="#c8e7e3" font-family="Manrope, Segoe UI, sans-serif" font-size="12">Локальное хранение, доступ</text><text x="1144" y="301" fill="#c8e7e3" font-family="Manrope, Segoe UI, sans-serif" font-size="12">по роли и безопасное удаление</text>

  <rect x="64" y="380" width="1312" height="112" rx="20" fill="#fff0f0" stroke="#efb8b8"/>
  <circle cx="104" cy="436" r="18" fill="#ef4444"/><path d="M96 428l16 16M112 428l-16 16" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <text x="140" y="427" fill="#8b1f1f" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="800">Запрещённый сценарий</text>
  <text x="140" y="453" fill="#8e5757" font-family="Manrope, Segoe UI, sans-serif" font-size="13">Сканирование чужих адресов, перехват непубличного трафика или обход ограничений без явного разрешения владельца.</text>
  <rect x="1112" y="409" width="230" height="52" rx="26" fill="#7f1d1d"/><text x="1150" y="441" fill="#fff" font-family="Manrope, Segoe UI, sans-serif" font-size="12" font-weight="800">ОСТАНОВИТЬ ПРОВЕРКУ</text>
</svg>
